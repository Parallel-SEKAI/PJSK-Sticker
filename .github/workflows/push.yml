name: Flutter CI Build

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  quality:
    name: Analyze and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: "3.38.1"

      - name: Install dependencies
        run: flutter pub get

      - name: Run analyzer
        run: flutter analyze

      - name: Run tests
        run: flutter test

  build:
    name: Build Flutter ${{ matrix.platform }}
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        platform: [Android, Linux, Windows]
        include:
          - platform: Android
            os: ubuntu-latest
          - platform: Linux
            os: ubuntu-latest
          - platform: Windows
            os: windows-latest

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        if: matrix.platform == 'Android'
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: "3.38.1"

      - name: Install Linux dependencies
        if: matrix.platform == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts libgtk-3-dev libblkid-dev liblzma-dev libgcrypt20-dev imagemagick

      - name: Install dependencies
        run: flutter pub get

      - name: Resolve build metadata
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          build_name=""
          git fetch --force --tags >/dev/null 2>&1 || true
          latest_tag="$(
            git tag -l 'v*' \
            | sed -E 's/^v//' \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+([.-].+)?$' \
            | sort -V \
            | tail -n 1 || true
          )"

          if [[ -n "$latest_tag" && "$latest_tag" =~ ^([0-9]+\.[0-9]+\.[0-9]+)(-.+)?$ ]]; then
            build_name="${BASH_REMATCH[1]}"
            echo "Using latest git tag version: v$latest_tag"
          fi

          if [[ -z "$build_name" ]]; then
            pubspec_version="$(awk '/^version:/ {print $2; exit}' pubspec.yaml)"
            if [[ "$pubspec_version" =~ ^([0-9]+\.[0-9]+\.[0-9]+)(\+[0-9]+)?$ ]]; then
              build_name="${BASH_REMATCH[1]}"
              echo "No valid git tag found, fallback to pubspec version: $pubspec_version"
            else
              echo "pubspec version '$pubspec_version' does not match X.Y.Z or X.Y.Z+N." >&2
              exit 1
            fi
          fi

          build_number="${GITHUB_RUN_NUMBER}"
          app_version="${build_name}+${build_number}"

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" && -n "${PR_NUMBER:-}" ]]; then
            app_version="${app_version}-pr.${PR_NUMBER}"
          fi

          build_timestamp="$(date -u +%s)"

          {
            echo "BUILD_NAME=$build_name"
            echo "BUILD_NUMBER=$build_number"
            echo "APP_VERSION=$app_version"
            echo "BUILD_TIMESTAMP=$build_timestamp"
          } >> "$GITHUB_ENV"

      - name: Detect Android signing secrets
        id: android_signing
        if: matrix.platform == 'Android'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail
          if [[ -n "${ANDROID_KEYSTORE_BASE64}" && -n "${ANDROID_STORE_PASSWORD}" && -n "${ANDROID_KEY_PASSWORD}" && -n "${ANDROID_KEY_ALIAS}" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Android signing secrets are missing. Building unsigned APKs."
          fi

      - name: Decode Keystore
        if: matrix.platform == 'Android' && steps.android_signing.outputs.available == 'true'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release-keystore.jks

      - name: Create key.properties
        if: matrix.platform == 'Android' && steps.android_signing.outputs.available == 'true'
        run: |
          echo "storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=release-keystore.jks" >> android/key.properties

      - name: Build Android APKs
        if: matrix.platform == 'Android'
        run: |
          flutter build apk \
            --release \
            --split-per-abi \
            --build-name "$BUILD_NAME" \
            --build-number "$BUILD_NUMBER" \
            --dart-define=APP_VERSION="$APP_VERSION" \
            --dart-define=BUILD_TIMESTAMP="$BUILD_TIMESTAMP"

      - name: Build Windows executable
        if: matrix.platform == 'Windows'
        run: |
          flutter build windows \
            --release \
            --build-name "$BUILD_NAME" \
            --build-number "$BUILD_NUMBER" \
            --dart-define=APP_VERSION="$APP_VERSION" \
            --dart-define=BUILD_TIMESTAMP="$BUILD_TIMESTAMP"

      - name: Build Linux executable
        if: matrix.platform == 'Linux'
        run: |
          flutter build linux \
            --release \
            --build-name "$BUILD_NAME" \
            --build-number "$BUILD_NUMBER" \
            --dart-define=APP_VERSION="$APP_VERSION" \
            --dart-define=BUILD_TIMESTAMP="$BUILD_TIMESTAMP"

      - name: Build Linux AppImage
        if: matrix.platform == 'Linux'
        run: |
          sudo apt-get install -y libfuse2
          convert assets/icon.png -resize 256x256! pjsk_sticker.png
          wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          mkdir -p AppDir/usr/bin
          cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/
          echo "[Desktop Entry]
          Name=PJSK Sticker
          Exec=pjsk_sticker
          Icon=pjsk_sticker
          Type=Application
          Categories=Utility;" > pjsk_sticker.desktop
          ./linuxdeploy-x86_64.AppImage --appimage-extract-and-run --appdir AppDir -i pjsk_sticker.png -d pjsk_sticker.desktop --output appimage
          rm linuxdeploy-x86_64.AppImage

      - name: Archive Windows build artifact
        if: matrix.platform == 'Windows'
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release -DestinationPath ${{ github.workspace }}/windows-release.zip
        shell: pwsh

      - name: Archive Linux build artifact
        if: matrix.platform == 'Linux'
        run: |
          cd build/linux/x64/release/bundle
          tar -czvf ${{ github.workspace }}/linux-release.tar.gz .

      - name: Upload Android APK (arm64-v8a)
        if: matrix.platform == 'Android' && hashFiles('build/app/outputs/apk/release/*arm64-v8a*.apk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-arm64-v8a
          path: build/app/outputs/apk/release/*arm64-v8a*.apk

      - name: Upload Android APK (armeabi-v7a)
        if: matrix.platform == 'Android' && hashFiles('build/app/outputs/apk/release/*armeabi-v7a*.apk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-armeabi-v7a
          path: build/app/outputs/apk/release/*armeabi-v7a*.apk

      - name: Upload Android APK (x86_64)
        if: matrix.platform == 'Android' && hashFiles('build/app/outputs/apk/release/*x86_64*.apk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-x86_64
          path: build/app/outputs/apk/release/*x86_64*.apk

      - name: Upload Windows artifact
        if: matrix.platform == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: windows-release.zip

      - name: Upload Linux artifact
        if: matrix.platform == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: |
            linux-release.tar.gz
            PJSK_Sticker-x86_64.AppImage
